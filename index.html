<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Criativo TOP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#16161a;font-family:'Poppins',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
input,textarea,button,select{font-family:'Poppins',sans-serif}
input[type=range]{width:100%;accent-color:#9B6FD0;height:4px}
button{-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(155,111,208,0.3);border-radius:4px}

/* LAYOUT */
#app{display:flex;flex-direction:column;min-height:100vh;max-width:960px;margin:0 auto}

/* TOP NAV TABS */
.nav-tabs{display:flex;overflow-x:auto;gap:6px;padding:12px 12px 0;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:7px 14px;font-size:12px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.45);font-weight:400;white-space:nowrap;transition:all .15s}
.nav-tab.active{border-color:rgba(155,111,208,0.65);background:rgba(155,111,208,0.22);color:#d8b4fe;font-weight:600}

/* FORMAT PILLS */
.fmt-pills{display:flex;gap:6px;padding:10px 12px 0;justify-content:center}
.fmt-pill{padding:5px 16px;font-size:11px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:transparent;color:rgba(255,255,255,0.3);transition:all .15s}
.fmt-pill.active{border-color:rgba(155,111,208,0.65);background:rgba(155,111,208,0.22);color:#d8b4fe}

/* PREVIEW AREA */
.preview-area{display:flex;flex-direction:column;align-items:center;padding:14px 12px 8px;gap:8px}
.preview-label{font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:.5px}

/* CONTROLS PANEL */
.controls{padding:0 12px 80px;display:flex;flex-direction:column;gap:14px}

/* SECTION */
.section-label{font-size:10px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,0.32);text-transform:uppercase;margin-bottom:7px}

/* UPLOAD */
.upload-box{border-radius:10px;cursor:pointer;border:1.5px dashed rgba(155,111,208,0.38);background:rgba(155,111,208,0.05);overflow:hidden;-webkit-tap-highlight-color:transparent}
.upload-inner{padding:18px;display:flex;flex-direction:column;align-items:center;gap:5px;color:rgba(255,255,255,0.4);font-size:13px}
.upload-icon{font-size:22px;color:rgba(155,111,208,0.7);line-height:1}
.upload-preview{width:100%;height:80px;object-fit:cover;display:block}
.upload-label{text-align:center;padding:6px;font-size:11px;color:#d8b4fe}

/* TAGS */
.tags-wrap{display:flex;flex-wrap:wrap;gap:7px}
.tag-btn{padding:6px 12px;font-size:12px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.42);font-weight:400;transition:all .15s}
.tag-btn.active{border-color:rgba(155,111,208,0.7);background:rgba(155,111,208,0.28);color:#d8b4fe;font-weight:600}

/* INPUTS */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,0.35);text-transform:uppercase}
.field input,.field textarea{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:9px;color:#fff;font-size:13px;padding:9px 11px;outline:none;width:100%;font-family:'Poppins',sans-serif;-webkit-appearance:none}
.field textarea{resize:none;line-height:1.5}
.field input:focus,.field textarea:focus{border-color:rgba(155,111,208,0.5)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#111113;border-top:1px solid rgba(255,255,255,0.07);padding:10px 16px;display:flex;gap:10px;z-index:100}
.btn-download{flex:1;padding:12px;border-radius:11px;border:none;cursor:pointer;font-size:14px;font-weight:700;color:#fff;font-family:'Poppins',sans-serif}
.btn-crop{padding:12px 16px;border-radius:11px;border:1px solid rgba(155,111,208,0.4);background:rgba(155,111,208,0.12);color:#d8b4fe;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;font-family:'Poppins',sans-serif}

/* CROP MODAL */
.crop-modal{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:flex-end;justify-content:center;z-index:9999}
@media(min-width:600px){.crop-modal{align-items:center}}
.crop-box{background:#18181b;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:400px}
@media(min-width:600px){.crop-box{border-radius:18px;padding:24px}}
.crop-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:3px}
.crop-sub{font-size:12px;color:rgba(255,255,255,0.38);margin-bottom:14px}
.crop-canvas{border-radius:10px;cursor:grab;display:block;width:100%;touch-action:none}
.crop-zoom{display:flex;align-items:center;gap:10px;margin-top:14px}
.crop-zoom span{font-size:11px;color:rgba(255,255,255,0.38);min-width:32px}
.crop-actions{display:flex;gap:8px;margin-top:16px}
.btn-cancel{flex:1;padding:11px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.45);font-size:13px;cursor:pointer;font-family:'Poppins',sans-serif}
.btn-apply{flex:2;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,#9B6FD0,#C46FD0);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif}

/* DESKTOP overrides */
@media(min-width:700px){
  #app{flex-direction:row;align-items:flex-start;gap:0;padding:0}
  .sidebar{width:240px;flex-shrink:0;background:#111113;min-height:100vh;padding:16px 14px 100px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
  .main-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:12px}
  .nav-tabs{display:none}
  .fmt-pills{display:none}
  .controls{display:none}
  .bottom-bar{display:none}
  .sidebar-content{display:flex!important;flex-direction:column;gap:14px}
  .preview-area{padding:0;gap:10px}
  .preview-area .fmt-pills-desk{display:flex!important}
}
@media(max-width:699px){
  .sidebar{display:none}
  .sidebar-content{display:none}
  .main-area{width:100%}
  .preview-area .fmt-pills-desk{display:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect,useCallback}=React;

const FORMATS={
  "Retrato":{w:1080,h:1350,dw:220,dh:275},
  "Feed":{w:1080,h:1080,dw:220,dh:220},
  "Story":{w:1080,h:1920,dw:155,dh:275},
};

const CATEGORIES={
  editorial:{label:"Editorial",grad:"linear-gradient(145deg,#9B6FD0 0%,#C46FD0 55%,#D06F9B 100%)",ge:[[0,"#9B6FD0"],[.55,"#C46FD0"],[1,"#D06F9B"]],tagBg:"rgba(255,255,255,0.22)",tagColor:"#fff",subColor:"rgba(255,255,255,0.78)"},
  negocios:{label:"Negócios",grad:"linear-gradient(145deg,#9B6FD0 0%,#4B9EF5 100%)",ge:[[0,"#9B6FD0"],[1,"#4B9EF5"]],tagBg:"rgba(75,158,245,0.38)",tagColor:"#fff",subColor:"rgba(255,255,255,0.75)"},
  lifestyle:{label:"Lifestyle",grad:"linear-gradient(145deg,#3DC99A 0%,#4B9EF5 100%)",ge:[[0,"#3DC99A"],[1,"#4B9EF5"]],tagBg:"rgba(61,201,154,0.38)",tagColor:"#fff",subColor:"rgba(255,255,255,0.80)"},
  moda:{label:"Moda",grad:"linear-gradient(145deg,#C46FD0 0%,#9B6FD0 100%)",ge:[[0,"#C46FD0"],[1,"#9B6FD0"]],tagBg:"rgba(196,111,208,0.40)",tagColor:"#fff",subColor:"rgba(255,255,255,0.78)"},
  eventos:{label:"Eventos",grad:"linear-gradient(145deg,#C46FD0 0%,#9B6FD0 40%,#4B9EF5 100%)",ge:[[0,"#C46FD0"],[.4,"#9B6FD0"],[1,"#4B9EF5"]],tagBg:"rgba(255,255,255,0.22)",tagColor:"#fff",subColor:"rgba(255,255,255,0.80)"},
  toptv:{label:"TopTV",grad:"linear-gradient(145deg,#1A1028 0%,#3A1A5C 60%,#1A1028 100%)",ge:[[0,"#1A1028"],[.6,"#3A1A5C"],[1,"#1A1028"]],tagBg:"rgba(155,111,208,0.38)",tagColor:"#C4A8E8",subColor:"rgba(196,168,232,0.80)"},
};

const TAGS={
  editorial:["Destaque","Capa","Especial","Entrevista","Matéria","Reportagem"],
  negocios:["Negócios","Economia","Empreendedorismo","Indústria","Agro é Top","Mercado"],
  lifestyle:["Saúde","Gastronomia","Bem-Estar","Top Health","Onde Ir","Esportes"],
  moda:["Moda","Beleza","Comportamento","Mulher","Estilo","Tendências"],
  eventos:["Evento","Prêmio Top","Show","Festival","Lançamento","Convite"],
  toptv:["TopTV","Ao Vivo","Entrevista","Bastidores","Episódio","Série"],
};

/* ── CROP ── */
function CropModal({src,onDone,onCancel}){
  const CW=308,CH=360;
  const cvRef=useRef();
  const st=useRef({img:null,ox:0,oy:0,scale:1,drag:false,sx:0,sy:0});
  const[sv,setSv]=useState(1);
  const raf=useRef();

  const draw=useCallback(()=>{
    const cv=cvRef.current;if(!cv)return;
    const ctx=cv.getContext("2d");
    const{img,ox,oy,scale}=st.current;if(!img)return;
    const P=14;
    ctx.clearRect(0,0,CW,CH);
    ctx.drawImage(img,ox,oy,img.naturalWidth*scale,img.naturalHeight*scale);
    ctx.fillStyle="rgba(0,0,0,0.52)";
    ctx.fillRect(0,0,CW,P);ctx.fillRect(0,CH-P,CW,P);
    ctx.fillRect(0,P,P,CH-P*2);ctx.fillRect(CW-P,P,P,CH-P*2);
    ctx.strokeStyle="rgba(255,255,255,0.9)";ctx.lineWidth=1.5;
    ctx.strokeRect(P,P,CW-P*2,CH-P*2);
    ctx.strokeStyle="rgba(255,255,255,0.22)";ctx.lineWidth=.5;
    for(let i=1;i<3;i++){
      const gx=P+(CW-P*2)*i/3,gy=P+(CH-P*2)*i/3;
      ctx.beginPath();ctx.moveTo(gx,P);ctx.lineTo(gx,CH-P);ctx.stroke();
      ctx.beginPath();ctx.moveTo(P,gy);ctx.lineTo(CW-P,gy);ctx.stroke();
    }
    const cs=10;ctx.strokeStyle="#fff";ctx.lineWidth=2.5;
    [[P,P],[CW-P,P],[P,CH-P],[CW-P,CH-P]].forEach(([cx,cy])=>{
      const dx=cx===P?1:-1,dy=cy===P?1:-1;
      ctx.beginPath();ctx.moveTo(cx+dx*cs,cy);ctx.lineTo(cx,cy);ctx.lineTo(cx,cy+dy*cs);ctx.stroke();
    });
  },[]);

  const clamp=(ox,oy,sc,img)=>{
    const iw=img.naturalWidth*sc,ih=img.naturalHeight*sc;
    return{ox:Math.min(0,Math.max(CW-iw,ox)),oy:Math.min(0,Math.max(CH-ih,oy))};
  };

  useEffect(()=>{
    const img=new Image();
    img.onload=()=>{
      const sc=Math.max(CW/img.naturalWidth,CH/img.naturalHeight);
      const{ox,oy}=clamp((CW-img.naturalWidth*sc)/2,(CH-img.naturalHeight*sc)/2,sc,img);
      st.current={...st.current,img,scale:sc,ox,oy};setSv(sc);draw();
    };
    img.src=src;
  },[src,draw]);

  const onPD=e=>{e.currentTarget.setPointerCapture(e.pointerId);const s=st.current;st.current={...s,drag:true,sx:e.clientX-s.ox,sy:e.clientY-s.oy};};
  const onPM=e=>{const s=st.current;if(!s.drag||!s.img)return;const{ox,oy}=clamp(e.clientX-s.sx,e.clientY-s.sy,s.scale,s.img);st.current={...s,ox,oy};cancelAnimationFrame(raf.current);raf.current=requestAnimationFrame(draw);};
  const onPU=()=>st.current={...st.current,drag:false};

  const onZoom=e=>{
    const s=st.current;if(!s.img)return;
    const sc=Math.max(Math.max(CW/s.img.naturalWidth,CH/s.img.naturalHeight),parseFloat(e.target.value));
    const{ox,oy}=clamp(s.ox,s.oy,sc,s.img);
    st.current={...s,scale:sc,ox,oy};setSv(sc);requestAnimationFrame(draw);
  };

  function confirm(){
    const{img,ox,oy,scale}=st.current;const P=14;
    const ow=CW-P*2,oh=CH-P*2;
    const out=document.createElement("canvas");out.width=ow*2;out.height=oh*2;
    const ctx=out.getContext("2d");ctx.scale(2,2);
    ctx.drawImage(img,ox-P,oy-P,img.naturalWidth*scale,img.naturalHeight*scale);
    onDone(out.toDataURL("image/jpeg",.96));
  }

  return(
    <div className="crop-modal">
      <div className="crop-box">
        <div className="crop-title">Ajustar foto</div>
        <div className="crop-sub">Arraste · zoom para encaixar</div>
        <canvas ref={cvRef} width={CW} height={CH} className="crop-canvas"
          onPointerDown={onPD} onPointerMove={onPM} onPointerUp={onPU} onPointerLeave={onPU}/>
        <div className="crop-zoom">
          <span>Zoom</span>
          <input type="range" min={.1} max={5} step={.005} value={sv} onChange={onZoom}/>
          <span style={{textAlign:"right"}}>{Math.round(sv*100)}%</span>
        </div>
        <div className="crop-actions">
          <button className="btn-cancel" onClick={onCancel}>Cancelar</button>
          <button className="btn-apply" onClick={confirm}>Aplicar</button>
        </div>
      </div>
    </div>
  );
}

/* ── PREVIEW ── */
function Preview({fmt,cat,data}){
  const{dw,dh}=FORMATS[fmt];
  const C=CATEGORIES[cat];
  const sc=dw/243,pad=dw*.05;
  const photoTop=dh*.125,photoH=dh*.615;
  return(
    <div style={{width:dw,height:dh,borderRadius:10,overflow:"hidden",position:"relative",background:C.grad,flexShrink:0,border:"0.5px solid rgba(255,255,255,0.1)"}}>
      <div style={{position:"absolute",top:-dh*.06,right:-dw*.08,width:dw*.38,height:dw*.38,borderRadius:"50%",background:"rgba(255,255,255,0.055)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",bottom:dh*.2,left:-dw*.1,width:dw*.28,height:dw*.28,borderRadius:"50%",background:"rgba(255,255,255,0.035)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",top:dh*.036,left:pad,right:pad,display:"flex",justifyContent:"space-between",alignItems:"flex-start",zIndex:2}}>
        <div>
          <div style={{color:"#fff",fontWeight:900,fontSize:19*sc,lineHeight:1,letterSpacing:-.5}}>TOP</div>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:4.6*sc,letterSpacing:2,marginTop:1.5,fontWeight:500}}>REVISTA · CATANDUVA</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:"rgba(255,255,255,0.75)",fontSize:5.2*sc,fontWeight:600}}>{data.edicao}</div>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:4.8*sc}}>{data.periodo}</div>
        </div>
      </div>
      <div style={{position:"absolute",top:photoTop,left:pad,width:dw-pad*2,height:photoH,borderRadius:7*sc,overflow:"hidden",background:"rgba(255,255,255,0.12)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1}}>
        {data.croppedImage
          ?<img src={data.croppedImage} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} alt=""/>
          :<div style={{textAlign:"center"}}>
            <div style={{width:20*sc,height:20*sc,borderRadius:"50%",border:`1.5px dashed rgba(255,255,255,0.3)`,margin:"0 auto 4px",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{color:"rgba(255,255,255,0.35)",fontSize:10*sc,lineHeight:1}}>+</span>
            </div>
            <span style={{color:"rgba(255,255,255,0.32)",fontSize:5.2*sc}}>foto da capa</span>
          </div>
        }
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:"28%",background:"linear-gradient(transparent,rgba(0,0,0,0.15))",pointerEvents:"none"}}/>
      </div>
      <div style={{position:"absolute",bottom:0,left:0,right:0,padding:`${dh*.02}px ${pad}px ${dh*.033}px`,zIndex:2}}>
        {data.selectedTags.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:3*sc,marginBottom:5*sc}}>
            {data.selectedTags.map(t=>(
              <span key={t} style={{background:C.tagBg,color:C.tagColor,fontSize:4.6*sc,fontWeight:700,letterSpacing:1.1,borderRadius:3*sc,padding:`${1.5*sc}px ${5.5*sc}px`}}>{t.toUpperCase()}</span>
            ))}
          </div>
        )}
        <div style={{color:"#fff",fontSize:10.5*sc,fontWeight:800,lineHeight:1.28,marginBottom:3*sc,textShadow:"0 1px 6px rgba(0,0,0,0.2)"}}>{data.titulo}</div>
        {data.subtitulo&&<div style={{color:C.subColor,fontSize:5.5*sc,fontWeight:400,lineHeight:1.5}}>{data.subtitulo}</div>}
      </div>
    </div>
  );
}

/* ── CONTROLS ── */
function Controls({fmt,setFmt,cat,setCat,data,setData,fileRef,handleFile,setRawSrc,setShowCrop}){
  const upd=(k,v)=>setData(d=>({...d,[k]:v}));
  const toggleTag=t=>setData(d=>({...d,selectedTags:d.selectedTags.includes(t)?d.selectedTags.filter(x=>x!==t):[...d.selectedTags,t]}));
  const switchCat=c=>{setCat(c);setData(d=>({...d,selectedTags:[]}));};
  const C=CATEGORIES[cat];

  return(
    <>
      {/* Categoria */}
      <div>
        <div className="section-label">Categoria</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {Object.entries(CATEGORIES).map(([k,v])=>(
            <button key={k} onClick={()=>switchCat(k)} className={`tag-btn${cat===k?" active":""}`}>{v.label}</button>
          ))}
        </div>
      </div>

      {/* Foto */}
      <div>
        <div className="section-label">Foto da Capa</div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
        <div className="upload-box" onClick={()=>fileRef.current.click()}>
          {data.croppedImage
            ?<><img src={data.croppedImage} className="upload-preview" alt=""/><div className="upload-label">Tocar para trocar</div></>
            :<div className="upload-inner"><span className="upload-icon">+</span><span>Toque para fazer upload</span></div>
          }
        </div>
        {data.croppedImage&&(
          <button onClick={()=>{setRawSrc(data.croppedImage);setShowCrop(true);}} style={{marginTop:6,width:"100%",padding:"7px",borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"rgba(255,255,255,0.38)",fontSize:12,cursor:"pointer"}}>
            Ajustar crop
          </button>
        )}
      </div>

      {/* Tags */}
      <div>
        <div className="section-label">Tags</div>
        <div className="tags-wrap">
          {(TAGS[cat]||[]).map(t=>(
            <button key={t} onClick={()=>toggleTag(t)} className={`tag-btn${data.selectedTags.includes(t)?" active":""}`}>{t}</button>
          ))}
        </div>
      </div>

      {/* Conteúdo */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div className="section-label">Conteúdo</div>
        <div className="grid2">
          <div className="field"><label>Edição</label><input value={data.edicao} onChange={e=>upd("edicao",e.target.value)}/></div>
          <div className="field"><label>Período</label><input value={data.periodo} onChange={e=>upd("periodo",e.target.value)}/></div>
        </div>
        <div className="field"><label>Título</label><textarea rows={3} value={data.titulo} onChange={e=>upd("titulo",e.target.value)}/></div>
        <div className="field"><label>Subtítulo (opcional)</label><input value={data.subtitulo} onChange={e=>upd("subtitulo",e.target.value)}/></div>
      </div>
    </>
  );
}

/* ── APP ── */
function App(){
  const[fmt,setFmt]=useState("Retrato");
  const[cat,setCat]=useState("editorial");
  const[data,setData]=useState({edicao:"ED. 221",periodo:"ABR·MAI 2025",titulo:"A nova geração de empresários que está transformando Catanduva",subtitulo:"",selectedTags:["Destaque"],croppedImage:null});
  const[rawSrc,setRawSrc]=useState(null);
  const[showCrop,setShowCrop]=useState(false);
  const fileRef=useRef();
  const C=CATEGORIES[cat];

  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{setRawSrc(ev.target.result);setShowCrop(true);};
    r.readAsDataURL(f);e.target.value="";
  };

  const handleExport=()=>{
    const{w,h}=FORMATS[fmt];
    const cv=document.createElement("canvas");cv.width=w;cv.height=h;
    const ctx=cv.getContext("2d");
    const gr=ctx.createLinearGradient(0,0,w,h);
    C.ge.forEach(([s,c])=>gr.addColorStop(s,c));
    ctx.fillStyle=gr;ctx.fillRect(0,0,w,h);
    const pad=w*.05,photoTop=h*.125,photoH=h*.615,photoW=w-pad*2;
    const finish=()=>{
      ctx.fillStyle="#fff";ctx.font=`900 88px Poppins,sans-serif`;ctx.textAlign="left";
      ctx.fillText("TOP",pad,h*.105);
      ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font=`500 24px Poppins,sans-serif`;
      ctx.fillText("REVISTA · CATANDUVA",pad,h*.135);
      ctx.textAlign="right";
      ctx.fillStyle="rgba(255,255,255,0.75)";ctx.font=`600 26px Poppins,sans-serif`;
      ctx.fillText(data.edicao,w-pad,h*.105);
      ctx.fillStyle="rgba(255,255,255,0.5)";ctx.font=`400 24px Poppins,sans-serif`;
      ctx.fillText(data.periodo,w-pad,h*.133);
      ctx.textAlign="left";
      ctx.font=`700 22px Poppins,sans-serif`;
      let tx=pad,tagY=h-h*.225;
      data.selectedTags.forEach(t=>{
        const tw=ctx.measureText(t.toUpperCase()).width+28;
        ctx.fillStyle="rgba(255,255,255,0.22)";
        ctx.beginPath();ctx.roundRect(tx,tagY-28,tw,40,6);ctx.fill();
        ctx.fillStyle="#fff";ctx.fillText(t.toUpperCase(),tx+14,tagY+4);tx+=tw+8;
      });
      ctx.fillStyle="#fff";ctx.font=`800 54px Poppins,sans-serif`;
      const maxW=w*.9,words=data.titulo.split(" ");
      let line="",lines=[],ty=h-h*.16;
      for(const word of words){const test=line+(line?" ":"")+word;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=word;}else line=test;}
      lines.push(line);lines.forEach((l,i)=>ctx.fillText(l,pad,ty+i*64));
      if(data.subtitulo){ctx.fillStyle=C.subColor;ctx.font=`400 26px Poppins,sans-serif`;ctx.fillText(data.subtitulo,pad,h-h*.028);}
      const a=document.createElement("a");a.download=`top-${cat}-${fmt.toLowerCase()}.png`;a.href=cv.toDataURL("image/png");a.click();
    };
    ctx.save();ctx.beginPath();ctx.roundRect(pad,photoTop,photoW,photoH,26);ctx.clip();
    if(data.croppedImage){const img=new Image();img.onload=()=>{ctx.drawImage(img,pad,photoTop,photoW,photoH);ctx.restore();finish();};img.src=data.croppedImage;}
    else{ctx.fillStyle="rgba(255,255,255,0.12)";ctx.fillRect(pad,photoTop,photoW,photoH);ctx.restore();finish();}
  };

  const controlProps={fmt,setFmt,cat,setCat,data,setData,fileRef,handleFile,setRawSrc,setShowCrop};

  return(
    <div id="app">
      {showCrop&&<CropModal src={rawSrc} onDone={v=>{setData(d=>({...d,croppedImage:v}));setShowCrop(false);}} onCancel={()=>setShowCrop(false)}/>}

      {/* DESKTOP sidebar */}
      <div className="sidebar">
        <div className="section-label" style={{fontSize:11,color:"rgba(155,111,208,0.8)",marginBottom:0}}>CRIATIVO TOP</div>
        <div className="sidebar-content">
          {/* formato desktop */}
          <div>
            <div className="section-label">Formato</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {Object.entries(FORMATS).map(([k,v])=>(
                <button key={k} onClick={()=>setFmt(k)} style={{padding:"6px 10px",fontSize:12,borderRadius:8,cursor:"pointer",textAlign:"left",border:fmt===k?"1px solid rgba(155,111,208,0.55)":"1px solid rgba(255,255,255,0.07)",background:fmt===k?"rgba(155,111,208,0.15)":"rgba(255,255,255,0.03)",color:fmt===k?"#d8b4fe":"rgba(255,255,255,0.42)",fontWeight:fmt===k?600:400}}>
                  {k} <span style={{fontSize:10,opacity:.5}}>{v.w}×{v.h}</span>
                </button>
              ))}
            </div>
          </div>
          <Controls {...controlProps}/>
          <button onClick={handleExport} style={{padding:"11px",borderRadius:10,border:"none",cursor:"pointer",background:`linear-gradient(135deg,${C.ge[0][1]},${C.ge[C.ge.length-1][1]})`,color:"#fff",fontSize:13,fontWeight:700}}>
            Baixar PNG
          </button>
        </div>
      </div>

      {/* MAIN */}
      <div className="main-area">
        {/* mobile: category tabs */}
        <div className="nav-tabs">
          {Object.entries(CATEGORIES).map(([k,v])=>(
            <button key={k} onClick={()=>{setCat(k);setData(d=>({...d,selectedTags:[]}));}} className={`nav-tab${cat===k?" active":""}`}>{v.label}</button>
          ))}
        </div>

        {/* preview */}
        <div className="preview-area">
          {/* format pills desktop */}
          <div className="fmt-pills fmt-pills-desk" style={{display:"none"}}>
            {Object.keys(FORMATS).map(f=>(
              <button key={f} onClick={()=>setFmt(f)} className={`fmt-pill${fmt===f?" active":""}`}>{f}</button>
            ))}
          </div>
          {/* format pills mobile */}
          <div className="fmt-pills">
            {Object.keys(FORMATS).map(f=>(
              <button key={f} onClick={()=>setFmt(f)} className={`fmt-pill${fmt===f?" active":""}`}>{f}</button>
            ))}
          </div>
          <Preview fmt={fmt} cat={cat} data={data}/>
          <div className="preview-label">{FORMATS[fmt].w}×{FORMATS[fmt].h}px · {C.label}</div>
        </div>

        {/* mobile controls */}
        <div className="controls">
          <Controls {...controlProps}/>
        </div>
      </div>

      {/* mobile bottom bar */}
      <div className="bottom-bar">
        {data.croppedImage&&(
          <button className="btn-crop" onClick={()=>{setRawSrc(data.croppedImage);setShowCrop(true);}}>Crop</button>
        )}
        <button className="btn-download" style={{background:`linear-gradient(135deg,${C.ge[0][1]},${C.ge[C.ge.length-1][1]})`}} onClick={handleExport}>
          Baixar PNG
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
